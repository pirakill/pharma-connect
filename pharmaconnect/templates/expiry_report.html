{% extends "base.html" %}
{% block title %}Expiry Report{% endblock %}
{% block content %}
<div class="topbar"><h2>Batch Expiry Report</h2></div>
<div class="card list-card">
  <div class="table-wrap">
  <table>
    <thead><tr><th>Facility</th><th>Item</th><th>Batch</th><th>Expiry</th><th>Qty</th><th>Value</th></tr></thead>
    <tbody>{% for r in rows %}<tr><td>{{ r.facility }}</td><td>{{ r.item }}</td><td>{{ r.batch }}</td><td>{{ r.expiry }}</td><td>{{ r.qty }}</td><td>₹{{ "{:,.0f}".format(r.value) }}</td></tr>{% endfor %}</tbody>
  </table>
  </div>
</div>
{% endblock %}
