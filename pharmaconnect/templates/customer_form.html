{% extends "base.html" %}
{% block title %}New Customer{% endblock %}
{% block content %}
<div class="card form-page-narrow">
  <h2>New Customer</h2>
  <form method="post">
    <div class="form-row"><label>Name</label><input name="name" required></div>
    <div class="form-row"><label>Phone</label><input name="phone"></div>
    <div class="form-row"><label>GSTIN</label><input name="gstin"></div>
    <div class="form-row"><label>Credit Limit (₹)</label><input name="credit_limit" type="number" step="0.01" value="0"><small class="text-sub">0 = no amount cap</small></div>
    <div class="form-row"><label>Credit Days</label><input name="credit_days" type="number" min="0" value="30"><small class="text-sub">Payment due after this many days</small></div>
    <button class="btn btn-primary" type="submit">Save</button>
  </form>
</div>
{% endblock %}
