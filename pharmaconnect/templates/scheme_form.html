{% extends "base.html" %}
{% block title %}New Scheme{% endblock %}
{% block content %}
<div class="topbar"><h2>New Promotion Scheme</h2></div>
<div class="card" style="max-width:520px">
  <form method="post">
    <div class="form-row"><label>Name</label><input name="name" required placeholder="Monsoon 10% Off"></div>
    <div class="form-row">
      <label>Type</label>
      <select name="kind">
        <option value="PERCENT">Percent discount</option>
        <option value="FLAT">Flat discount (₹)</option>
        <option value="BOGO">Buy-one-get-one</option>
      </select>
    </div>
    <div class="form-row"><label>Value</label><input name="value" type="number" step="0.01" value="5"></div>
    <div class="form-row">
      <label>Item (optional)</label>
      <select name="item_id">
        <option value="">All items</option>
        {% for i in items %}<option value="{{ i.id }}">{{ i.name }}</option>{% endfor %}
      </select>
    </div>
    <div class="form-row"><label>Min qty</label><input name="min_qty" type="number" value="1"></div>
    <div class="form-row"><label>Free qty (BOGO)</label><input name="free_qty" type="number" value="0"></div>
    <div class="form-row"><label>Valid from</label><input name="valid_from" type="date"></div>
    <div class="form-row"><label>Valid to</label><input name="valid_to" type="date"></div>
    <button class="btn btn-primary" type="submit">Save Scheme</button>
    <a class="btn btn-secondary" href="{{ url_for('schemes.index') }}">Cancel</a>
  </form>
</div>
{% endblock %}
