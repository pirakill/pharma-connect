name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        env:
          PYTHONPATH: .
        run: python -m pytest tests/ -q --tb=line

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t pharmaconnect:ci .

      - name: Verify image starts
        run: |
          docker run -d --name pc-ci -p 5050:5000 \
            -e PHARMACONNECT_SECRET=ci-test-secret \
            -e PHARMACONNECT_CRON_SECRET=ci-cron-secret \
            pharmaconnect:ci
          for i in $(seq 1 30); do
            if curl -sf http://127.0.0.1:5050/api/health; then
              echo "Health OK"
              docker stop pc-ci
              exit 0
            fi
            sleep 2
          done
          docker logs pc-ci
          docker stop pc-ci
          exit 1