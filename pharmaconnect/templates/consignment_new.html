{% extends "base.html" %}
{% block title %}Ship Consignment{% endblock %}
{% block content %}
<div class="topbar"><h2>Ship Consignment Stock</h2></div>
<div class="card">
  <form method="post" id="ship-form">
    {% if from_restock %}
    <input type="hidden" name="from_warehouse" value="1">
    <p style="color:var(--muted);margin-bottom:1rem">Restock shipment — stock will be deducted from central warehouse.</p>
    {% endif %}
    <div class="form-inline">
      <div class="form-row">
        <label>Facility</label>
        <select name="facility_id" id="facility-select" required>
          {% for f in facilities %}
          <option value="{{ f.id }}" {% if prefill_facility_id == f.id %}selected{% endif %}>{{ f.name }} ({{ f.kind }})</option>
          {% endfor %}
        </select>
      </div>
      <div class="form-row" style="flex:2">
        <label>Note</label>
        <input name="note" placeholder="Optional note">
      </div>
    </div>
    <table id="lines-table">
      <thead>
        <tr><th>Item</th><th>Batch</th><th>Expiry</th><th>MRP</th><th>PTR</th><th>Cost</th><th>Qty</th><th></th></tr>
      </thead>
      <tbody></tbody>
    </table>
    <button type="button" class="btn btn-secondary" onclick="addLine()">+ Add line</button>
    <button type="submit" class="btn btn-primary" style="margin-left:0.5rem">Post Shipment</button>
  </form>
</div>
{% endblock %}
{% block scripts %}
<script>
const items = {{ items|map(attribute='id')|list|tojson }};
const itemData = {
  {% for i in items %}
  {{ i.id }}: { name: {{ i.name|tojson }}, mrp: {{ i.mrp }}, ptr: {{ i.ptr }} },
  {% endfor %}
};
function addLine(prefill) {
  const tbody = document.querySelector("#lines-table tbody");
  const tr = document.createElement("tr");
  const itemId = prefill ? String(prefill.item_id) : Object.keys(itemData)[0];
  const options = Object.entries(itemData).map(([id,d]) =>
    `<option value="${id}" ${id === itemId ? "selected" : ""}>${d.name}</option>`
  ).join("");
  const expiry = prefill && prefill.expiry ? prefill.expiry : "";
  const sourceId = prefill && prefill._source_batch_id ? prefill._source_batch_id : "";
  tr.innerHTML = `
    <td><select name="item_id" onchange="fillRates(this)">${options}</select>
        <input type="hidden" name="source_batch_id" value="${sourceId}"></td>
    <td><input name="batch_no" required placeholder="B001" value="${prefill ? prefill.batch_no : ""}"></td>
    <td><input name="expiry" type="date" required value="${expiry}"></td>
    <td><input name="mrp" type="number" step="0.01" required value="${prefill ? prefill.mrp : ""}"></td>
    <td><input name="ptr" type="number" step="0.01" required value="${prefill ? prefill.ptr : ""}"></td>
    <td><input name="cost_rate" type="number" step="0.01" required value="${prefill ? prefill.cost_rate : ""}"></td>
    <td><input name="qty" type="number" step="0.001" required value="${prefill ? prefill.qty : ""}"></td>
    <td><button type="button" onclick="this.closest('tr').remove()">×</button></td>`;
  tbody.appendChild(tr);
  if (!prefill) fillRates(tr.querySelector("select"));
}
function fillRates(sel) {
  const d = itemData[sel.value];
  const row = sel.closest("tr");
  row.querySelector('[name="mrp"]').value = d.mrp;
  row.querySelector('[name="ptr"]').value = d.ptr;
  row.querySelector('[name="cost_rate"]').value = (d.ptr * 0.85).toFixed(2);
}
const prefillLines = {{ prefill_lines|tojson }};
if (prefillLines.length) {
  prefillLines.forEach(line => addLine(line));
} else {
  addLine();
}
</script>
{% endblock %}
