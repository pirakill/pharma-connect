{% extends "base.html" %}
{% block title %}Purchase Return{% endblock %}
{% block content %}
<div class="topbar">
  <h2>Purchase Return — {{ purchase.number }}</h2>
  <a class="btn btn-secondary" href="{{ url_for('purchase.view', pid=purchase.id) }}">Back</a>
</div>
<div class="card">
  <form method="post">
    <table>
      <thead><tr><th>Item</th><th>Batch</th><th>Purchased</th><th>Return Qty</th></tr></thead>
      <tbody>
        {% for l in purchase.lines %}
        <tr>
          <td>{{ l.item.name }}</td>
          <td>{{ l.batch_no }}</td>
          <td>{{ l.qty }}</td>
          <td><input name="qty_{{ l.id }}" type="number" step="0.001" min="0" max="{{ l.qty }}" placeholder="0"></td>
        </tr>
        {% endfor %}
      </tbody>
    </table>
    <div class="form-row mt-1">
      <label>Reason</label>
      <input name="reason" placeholder="Damaged / near expiry / excess stock">
    </div>
    <button class="btn btn-primary" type="submit">Post Purchase Return</button>
  </form>
</div>
{% endblock %}
