{% extends "base.html" %}
{% block title %}Sign in — {{ APP_NAME }}{% endblock %}
{% block content %}
<div class="login-wrap">
  <div class="card login-card">
    <h2 class="login-logo">{{ APP_NAME }}</h2>
    <p class="login-tagline">Consignment ERP · GST billing · Live inventory</p>
    <form method="post">
      <div class="form-row">
        <label>Username</label>
        <input name="username" required autofocus autocomplete="username">
      </div>
      <div class="form-row">
        <label>Password</label>
        <input name="password" type="password" required autocomplete="current-password">
      </div>
      <button class="btn btn-primary btn-block btn-lg" type="submit">Sign in</button>
    </form>
    <div class="login-hint">
      <span class="text-sub">Demo access</span>
      <code>distributor / admin</code>
      <code>retail1 / admin</code>
      <code>lender1 / admin</code>
    </div>
  </div>
</div>
{% endblock %}
