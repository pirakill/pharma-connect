{% extends "base.html" %}
{% block title %}New Customer{% endblock %}
{% block content %}
<div class="card" style="max-width:500px">
  <h2>New Customer</h2>
  <form method="post">
    <div class="form-row"><label>Name</label><input name="name" required></div>
    <div class="form-row"><label>Phone</label><input name="phone"></div>
    <div class="form-row"><label>GSTIN</label><input name="gstin"></div>
    <div class="form-row"><label>Credit Limit</label><input name="credit_limit" type="number" step="0.01" value="0"></div>
    <button class="btn btn-primary" type="submit">Save</button>
  </form>
</div>
{% endblock %}
