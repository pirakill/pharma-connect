{% extends "base.html" %}
{% block title %}{% if item %}Edit{% else %}Add{% endif %} Medicine{% endblock %}
{% block content %}
<div class="card" style="max-width:640px">
  <h2>{% if item %}Edit {{ item.code }}{% else %}Add Medicine{% endif %}</h2>
  <form method="post">
    {% if not item %}
    <div class="form-row"><label>Code *</label><input name="code" required placeholder="PCM500"></div>
    {% endif %}
    <div class="form-row"><label>Name *</label><input name="name" required value="{{ item.name if item else '' }}"></div>
    <div class="form-inline">
      <div class="form-row"><label>Barcode</label><input name="barcode" value="{{ item.barcode if item else '' }}"></div>
      <div class="form-row"><label>Manufacturer</label><input name="manufacturer" value="{{ item.manufacturer if item else '' }}"></div>
    </div>
    <div class="form-inline">
      <div class="form-row"><label>Pack</label><input name="pack" value="{{ item.pack if item else '1x10' }}"></div>
      <div class="form-row"><label>Unit</label><input name="unit" value="{{ item.unit if item else 'strip' }}"></div>
      <div class="form-row"><label>Schedule</label>
        <select name="schedule">
          <option value="">—</option>
          {% for s in ['H','H1','X','G'] %}
          <option value="{{ s }}" {% if item and item.schedule==s %}selected{% endif %}>{{ s }}</option>
          {% endfor %}
        </select>
      </div>
    </div>
    <div class="form-inline">
      <div class="form-row"><label>HSN</label><input name="hsn" value="{{ item.hsn if item else '' }}" placeholder="3004"></div>
      <div class="form-row"><label>GST Rate %</label>
        <select name="gst_rate">
          <option value="">—</option>
          {% for slab in tax_slabs %}
          <option value="{{ slab.rate }}" {% if item and item.tax_slab_id==slab.id %}selected{% endif %}>{{ slab.rate }}%</option>
          {% endfor %}
          <option value="18">18%</option>
        </select>
      </div>
      <div class="form-row"><label>MRP (₹)</label><input name="mrp" type="number" step="0.01" value="{{ item.mrp if item else '' }}"></div>
      <div class="form-row"><label>PTR (₹)</label><input name="ptr" type="number" step="0.01" value="{{ item.ptr if item else '' }}"></div>
    </div>
    <button class="btn btn-primary" type="submit">Save</button>
    <a class="btn btn-secondary" href="{{ url_for('items.index') }}">Cancel</a>
  </form>
</div>
{% endblock %}
